name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Validate TypeScript, tests, manifests, and policy checks
        run: npm run validate

      - name: Audit npm dependencies
        run: npm run audit

      - name: Check diff whitespace
        run: git diff --check

  docs:
    name: Docs
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install docs dependencies
        run: pip install -r docs/requirements.txt

      - name: Build docs strictly
        run: mkdocs build --strict --site-dir site
