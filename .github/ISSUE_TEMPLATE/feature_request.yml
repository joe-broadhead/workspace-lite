name: Feature request
description: Suggest a tool, service capability, docs improvement, or workflow improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to accomplish?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the tool, docs, setup, or workflow change.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Drive
        - Gmail
        - Calendar
        - Sheets
        - Slides
        - Docs
        - Tasks
        - Forms
        - Setup
        - Docs
        - CI or release
        - Security
        - Other
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
    validations:
      required: false
